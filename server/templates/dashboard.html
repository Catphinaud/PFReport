<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}}</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"></script>
    <style>
        :root {
            color-scheme: dark;
            --bg: #141611;
            --panel: #1b1e17;
            --panel-2: #20251b;
            --line: #3a4134;
            --line-soft: #2a3027;
            --text: #e8eddf;
            --muted: #a6ad9c;
            --quiet: #7f8774;
            --accent: #b9d35c;
            --bad: #de6b62;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.45 "IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        }

        .shell {
            max-width: 1500px;
            margin: 0 auto;
            padding: 22px 24px 36px;
        }

        header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--line);
        }

        h1 {
            margin: 0 0 5px;
            font-size: 21px;
            font-weight: 650;
            letter-spacing: -0.03em;
        }

        h2 {
            margin: 26px 0 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .subhead, .status, .small {
            color: var(--muted);
        }

        .status.bad {
            color: var(--bad);
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1.2fr) minmax(220px, 1fr) repeat(5, minmax(90px, 0.6fr));
            gap: 8px;
            margin: 0 0 14px;
        }

        .toolbar .wide {
            grid-column: span 2;
        }

        input, button {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 3px;
            background: var(--panel);
            color: var(--text);
            padding: 8px 10px;
            font: inherit;
        }

        input:focus {
            outline: 1px solid var(--accent);
            outline-offset: -1px;
        }

        button {
            cursor: pointer;
            background: var(--accent);
            border-color: var(--accent);
            color: #171a12;
            font-weight: 700;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 1px;
            margin: 0 0 14px;
            border: 1px solid var(--line);
            background: var(--line-soft);
        }

        .stat {
            min-width: 0;
            padding: 10px 12px;
            background: var(--panel);
        }

        .label {
            color: var(--quiet);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .value {
            overflow: hidden;
            margin-top: 5px;
            color: var(--text);
            font-size: 15px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--line);
            background: var(--panel);
        }

        th, td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--line-soft);
            vertical-align: top;
        }

        th {
            color: var(--quiet);
            background: var(--panel-2);
            font-size: 11px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        tbody tr:hover td {
            background: rgba(185, 211, 92, 0.045);
        }

        code {
            color: var(--accent);
        }

        .time {
            color: var(--muted);
            white-space: nowrap;
        }

        .desc {
            max-width: 760px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty {
            color: var(--quiet);
            text-align: center;
        }

        .routes {
            max-width: 980px;
        }

        @media (max-width: 980px) {
            .shell {
                padding: 16px;
            }

            header {
                display: block;
            }

            .toolbar, .stats {
                grid-template-columns: 1fr;
            }

            .table-wrap {
                overflow-x: auto;
            }

            table {
                min-width: 960px;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <header>
        <div>
            <h1>{{.Title}}</h1>
            <div class="subhead">Recent Party Finder listings received by this server.</div>
        </div>
        <div id="status" class="status">Loading...</div>
    </header>

    <section class="toolbar" aria-label="Filters">
        <input id="token" type="password" placeholder="Bearer token, if configured">
        <input id="query" class="wide" placeholder="Any text / old search">
        <input id="name" placeholder="Name">
        <input id="world" placeholder="World">
        <input id="dutyId" type="number" min="0" placeholder="Duty">
        <input id="minilvMin" type="number" min="0" placeholder="min ilv">
        <input id="minilvMax" type="number" min="0" placeholder="max ilv">
        <input id="description" class="wide" placeholder="Description contains">
        <input id="area" placeholder="Area">
        <input id="hash" placeholder="Hash">
        <input id="source" placeholder="Source">
        <input id="page" type="number" min="1" value="1" title="Page">
        <input id="limit" type="number" min="1" max="2000" value="100" title="Rows per page">
        <button id="prevPage">Prev</button>
        <button id="nextPage">Next</button>
        <button id="refresh">Refresh</button>
    </section>

    <section class="stats" aria-label="Ingest statistics">
        <div class="stat">
            <div class="label">Hashes</div>
            <div class="value" id="seenHashes">-</div>
        </div>
        <div class="stat">
            <div class="label">Recent</div>
            <div class="value" id="recentAvailable">-</div>
        </div>
        <div class="stat">
            <div class="label">Page</div>
            <div class="value" id="pageState">-</div>
        </div>
        <div class="stat">
            <div class="label">Limit</div>
            <div class="value" id="recentCapacity">-</div>
        </div>
        <div class="stat">
            <div class="label">Status</div>
            <div class="value" id="serverStatus">Online</div>
        </div>
        <div class="stat">
            <div class="label">Updated</div>
            <div class="value" id="updatedAt">-</div>
        </div>
    </section>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Received</th>
                <th>Player</th>
                <th>World</th>
                <th>Duty</th>
                <th>minilv</th>
                <th>Area</th>
                <th>Hash</th>
                <th>Description</th>
            </tr>
            </thead>
            <tbody id="records"></tbody>
        </table>
    </div>

    <section class="routes">
        <h2>Routes</h2>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Method</th>
                    <th>Path</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody id="routes"></tbody>
            </table>
        </div>
    </section>
</div>

<script>
    function headers() {
      const token = $("#token").val();
      localStorage.setItem("pfreportToken", token);
      return token ? { "Authorization": "Bearer " + token } : {};
    }

    function esc(value) {
      return $("<div>").text(value == null ? "" : value).html();
    }

    function api(url) {
      return $.ajax({ url: url, headers: headers(), dataType: "json" });
    }

    function loadStats() {
      return api("/v1/stats").done(function (s) {
        $("#seenHashes").text(s.seenHashes);
        $("#recentAvailable").text(s.recentAvailable);
        $("#recentCapacity").text(s.recentCapacity);
        $("#serverStatus").text("Online");
      });
    }

    function loadRecords() {
      const params = new URLSearchParams();
      addParam(params, "page", $("#page").val() || "1");
      addParam(params, "perPage", $("#limit").val() || "100");
      addParam(params, "q", $("#query").val());
      addParam(params, "name", $("#name").val());
      addParam(params, "world", $("#world").val());
      addParam(params, "dutyId", $("#dutyId").val());
      addParam(params, "minilvMin", $("#minilvMin").val());
      addParam(params, "minilvMax", $("#minilvMax").val());
      addParam(params, "description", $("#description").val());
      addParam(params, "area", $("#area").val());
      addParam(params, "hash", $("#hash").val());
      addParam(params, "source", $("#source").val());
      return api("/v1/recent?" + params.toString()).done(function (data) {
        const rows = data.records || [];
        $("#pageState").text((data.page || 1) + " / " + Math.max(1, Math.ceil((data.total || 0) / (data.perPage || 1))));
        $("#nextPage").prop("disabled", !data.hasMore);
        $("#prevPage").prop("disabled", (data.page || 1) <= 1);
        $("#records").empty();
        if (!rows.length) {
          $("#records").append('<tr><td colspan="8" class="empty">No records</td></tr>');
          return;
        }

        rows.forEach(function (r) {
          const l = r.listing || {};
          $("#records").append(
            "<tr>" +
            "<td class='time'>" + esc(r.receivedAt) + "</td>" +
            "<td>" + esc(l.name) + "</td>" +
            "<td>" + esc(l.homeWorld) + "</td>" +
            "<td>" + esc(l.dutyId) + "</td>" +
            "<td>" + esc(l.minilv) + "</td>" +
            "<td>" + esc(l.searchArea) + "</td>" +
            "<td><code>" + esc(l.hash) + "</code></td>" +
            "<td class='desc'>" + esc(l.description) + "</td>" +
            "</tr>"
          );
        });
      });
    }

    function addParam(params, key, value) {
      value = $.trim(value || "");
      if (value !== "") {
        params.set(key, value);
      }
    }

    function loadRoutes() {
      return api("/v1/routes").done(function (routes) {
        $("#routes").empty();
        routes.forEach(function (r) {
          $("#routes").append(
            "<tr><td>" + esc(r.method) + "</td><td><code>" + esc(r.path) + "</code></td><td>" + esc(r.description) + "</td></tr>"
          );
        });
      });
    }

    function refresh() {
      $("#status").removeClass("bad").text("Loading...");
      $.when(loadStats(), loadRecords(), loadRoutes())
        .done(function () {
          const t = new Date().toLocaleTimeString();
          $("#updatedAt").text(t);
          $("#status").text("Updated " + t);
        })
        .fail(function (xhr) {
          const msg = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : xhr.statusText;
          $("#status").addClass("bad").text("Failed: " + xhr.status + " " + msg);
        });
    }

    $(function () {
      $("#token").val(localStorage.getItem("pfreportToken") || "");
      $("#refresh").on("click", refresh);
      $("#prevPage").on("click", function () {
        const page = Math.max(1, parseInt($("#page").val() || "1", 10) - 1);
        $("#page").val(page);
        refresh();
      });
      $("#nextPage").on("click", function () {
        const page = Math.max(1, parseInt($("#page").val() || "1", 10) + 1);
        $("#page").val(page);
        refresh();
      });
      $(".toolbar input").on("keydown", function (e) {
        if (e.key === "Enter") {
          $("#page").val(1);
          refresh();
        }
      });
      refresh();
      setInterval(refresh, 10000);
    });
</script>
</body>
</html>
